name: RC - Build & Test

on:
  push:
    branches: [rc]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.26'
          cache-dependency-path: src/go.sum

      - name: Run all tests
        working-directory: src
        run: go test ./... -v -count=1

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v5
        with:
          context: .
          push: false
          load: true
          tags: skills-rce:test
          no-cache: true

      - name: Test Docker image
        run: |
          docker run -d --name test-rce -p 7891:7891 skills-rce:test
          sleep 3

          echo "=== Health ==="
          curl -sf http://localhost:7891/health | jq .

          echo "=== Status ==="
          curl -sf http://localhost:7891/status | jq '{runtimes: [.runtimes[] | select(.version != null) | .name], languages, python_packages: (.packages.python | length), node_packages: (.packages.node | length)}'

          echo "=== Run Python ==="
          curl -sf -X POST http://localhost:7891/run \
            -H "Content-Type: application/json" \
            -d '{"id":"rc-1","language":"python","code":"import numpy; print(numpy.__version__)"}' | jq .

          echo "=== Run JS ==="
          curl -sf -X POST http://localhost:7891/run \
            -H "Content-Type: application/json" \
            -d '{"id":"rc-2","language":"javascript","code":"console.log(JSON.stringify({ok:true}))"}' | jq .

          docker stop test-rce

  summary:
    needs: [test, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: RC Summary
        run: |
          echo "RC Build Complete!"
          echo ""
          echo "All checks passed:"
          echo "  - Go tests (unit + e2e)"
          echo "  - Docker build + smoke test"
          echo ""
          echo "Ready to merge to main for release."
