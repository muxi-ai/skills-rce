# Skills RCE Release Workflow
#
# RELEASE FLOW:
#   develop -> rc (PR) -> main (merge) -> auto-release
#
# STEP ORDER:
#   1. version: calculate ScalVer version, commit .version
#   2. docker-amd64, docker-arm64: build + push to GHCR (parallel)
#   3. docker-manifest: create multi-arch manifest
#   4. sif-amd64, sif-arm64: convert Docker to SIF (parallel)
#   5. github-release: create release + tag + upload SIF files
#   6. merge-back: merge main -> develop
#
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: muxi-ai/skills-rce

jobs:
  # ===== Version =====
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      sha: ${{ steps.sha.outputs.SHA }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Calculate next version (ScalVer)
        id: version
        run: |
          CURRENT_VERSION=$(cat .version | tr -d '[:space:]')
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          CURRENT_DATE=$(echo $CURRENT_VERSION | cut -d. -f2)
          CURRENT_PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          TODAY=$(date +%Y%m%d)

          if [ "$CURRENT_DATE" = "$TODAY" ]; then
            NEXT_PATCH=$((CURRENT_PATCH + 1))
            NEXT_VERSION="${MAJOR}.${TODAY}.${NEXT_PATCH}"
          else
            NEXT_VERSION="${MAJOR}.${TODAY}.0"
          fi

          echo "VERSION=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT_VERSION -> Next: v$NEXT_VERSION"

      - name: Update version file
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "$VERSION" > .version
          cp .version src/cmd/rce/version.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version src/cmd/rce/version.txt

          if ! git diff --cached --quiet; then
            git commit -m "chore: release v$VERSION"
            git push
          fi

      - name: Output release commit SHA
        id: sha
        run: echo "SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ===== Docker (AMD64) =====
  docker-amd64:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          df -h

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.version.outputs.version }}-amd64
          platforms: linux/amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          provenance: false
          sbom: false

  # ===== Docker (ARM64) =====
  docker-arm64:
    runs-on: ubuntu-24.04-arm
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.version.outputs.version }}-arm64
          platforms: linux/arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          provenance: false
          sbom: false

  # ===== Multi-Arch Manifest =====
  docker-manifest:
    runs-on: ubuntu-latest
    needs: [version, docker-amd64, docker-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Create and push manifest
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create -t ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          docker buildx imagetools create -t ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

  # ===== SIF (AMD64) =====
  sif-amd64:
    runs-on: ubuntu-latest
    needs: [version, docker-manifest]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          sudo rm -rf /usr/share/swift /usr/local/julia* /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SIF (amd64)
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          apptainer build skills-rce-${{ needs.version.outputs.version }}-linux-amd64.sif \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-amd64

      - name: Upload SIF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: sif-amd64
          path: skills-rce-${{ needs.version.outputs.version }}-linux-amd64.sif

  # ===== SIF (ARM64) =====
  sif-arm64:
    runs-on: ubuntu-24.04-arm
    needs: [version, docker-manifest]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SIF (arm64)
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          apptainer build skills-rce-${{ needs.version.outputs.version }}-linux-arm64.sif \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-arm64

      - name: Upload SIF artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: sif-arm64
          path: skills-rce-${{ needs.version.outputs.version }}-linux-arm64.sif

  # ===== GitHub Release =====
  github-release:
    runs-on: ubuntu-latest
    needs: [version, docker-manifest, sif-amd64, sif-arm64]
    permissions:
      contents: write

    steps:
      - name: Download SIF artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v4
        with:
          pattern: sif-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: |
            skills-rce-${{ needs.version.outputs.version }}-linux-amd64.sif
            skills-rce-${{ needs.version.outputs.version }}-linux-arm64.sif
          body: |
            ## Skills RCE v${{ needs.version.outputs.version }}

            **Docker:** `docker pull ghcr.io/muxi-ai/skills-rce:v${{ needs.version.outputs.version }}`

            **SIF (Singularity/Apptainer):**
            - `skills-rce-${{ needs.version.outputs.version }}-linux-amd64.sif`
            - `skills-rce-${{ needs.version.outputs.version }}-linux-arm64.sif`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Merge Back to Develop =====
  merge-back:
    runs-on: ubuntu-latest
    needs: [version, github-release]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.MUXI_RELEASE_TOKEN }}

      - name: Merge main back to develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin develop
          git checkout develop
          git merge --no-ff main -m "chore: merge main back to develop (v${{ needs.version.outputs.version }}) [skip ci]"
          git push origin develop
